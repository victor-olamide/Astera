name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Rust Contracts ----
  rust-contracts:
    name: Rust Contracts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        contract: [invoice, credit_score, share]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo clippy -- -D warnings

      - name: Build contract
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo test --verbose

  rust-integration-tests:
    name: Cross-Contract Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release -p invoice -p pool -p credit_score -p share

      - name: Run cross-contract integration tests
        run: cargo test --manifest-path contracts/tests/Cargo.toml

  rust-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit --file ../Cargo.lock
        working-directory: contracts

  # ---- Frontend ----
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        env:
          NPM_CONFIG_OMIT: ""
          npm_config_optional: "true"
        run: |
          npm ci --include=optional

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Type-check TypeScript
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_USDC_TOKEN_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
